<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Portfolio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; line-height: 1.6; }
    a { color: inherit; text-decoration: none; }

    :root {
      --accent: #22d3ee; --accent-dim: rgba(34,211,238,0.12);
      --bg: #0d1117; --bg2: #161b22; --border: #30363d;
      --muted: #8b949e; --white: #f0f6fc;
    }

    /* Navbar */
    nav { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(13,17,23,0.94); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 960px; margin: auto; display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1.5rem; }
    .logo { font-size: 1rem; font-weight: 700; color: var(--accent); }
    .nav-links { display: flex; gap: 1.75rem; list-style: none; }
    .nav-links a { font-size: 0.85rem; color: var(--muted); transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }

    /* Shared */
    section { padding: 5rem 1.5rem; }
    .container { max-width: 960px; margin: auto; }
    .section-label { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.35rem; }
    .section-title { font-size: 1.75rem; font-weight: 700; color: var(--white); margin-bottom: 2.5rem; }

    /* Hero */
    #home { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(34,211,238,0.05), transparent); }
    .hero-tag { display: inline-block; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(34,211,238,0.3); padding: 0.25rem 0.85rem; border-radius: 999px; margin-bottom: 1.25rem; }
    .hero-name { font-size: clamp(2.2rem, 6vw, 3.5rem); font-weight: 800; color: var(--white); line-height: 1.1; margin-bottom: 1rem; }
    .hero-sub { font-size: 1rem; color: var(--muted); max-width: 480px; margin: 0 auto 2rem; }
    .btn-group { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .btn { padding: 0.6rem 1.4rem; border-radius: 6px; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: #0d1117; border: 1px solid var(--accent); }
    .btn-primary:hover { background: #67e8f9; }
    .btn-outline { background: transparent; color: var(--white); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .hero-socials { display: flex; gap: 1.5rem; justify-content: center; margin-top: 2rem; }
    .hero-socials a { font-size: 0.82rem; color: var(--muted); transition: color 0.2s; }
    .hero-socials a:hover { color: var(--accent); }

    /* About */
    #about { background: var(--bg2); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
    .about-text p { color: var(--muted); margin-bottom: 1rem; font-size: 0.95rem; }
    .about-text p strong { color: var(--white); font-weight: 600; }
    .about-cards { display: flex; flex-direction: column; gap: 0.75rem; }
    .about-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.1rem; display: flex; align-items: flex-start; gap: 0.85rem; transition: border-color 0.2s; }
    .about-card:hover { border-color: rgba(34,211,238,0.4); }
    .card-icon { font-size: 1.15rem; flex-shrink: 0; }
    .card-title { font-size: 0.875rem; font-weight: 600; color: var(--white); }
    .card-desc { font-size: 0.8rem; color: var(--muted); }

    /* Skills */
    #skills { background: var(--bg); }
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .skill-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 1.1rem; transition: border-color 0.2s; }
    .skill-card:hover { border-color: rgba(34,211,238,0.35); }
    .skill-cat { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tag { font-size: 0.72rem; padding: 0.2rem 0.6rem; background: #21262d; color: var(--muted); border: 1px solid var(--border); border-radius: 999px; }

    /* Projects */
    #projects { background: var(--bg2); }
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.1rem; }
    .project-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; transition: border-color 0.2s; }
    .project-card:hover { border-color: rgba(34,211,238,0.4); }
    .project-title { font-size: 0.975rem; font-weight: 700; color: var(--white); }
    .project-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.55; flex: 1; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .project-tag { font-size: 0.68rem; padding: 0.15rem 0.55rem; background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(34,211,238,0.25); border-radius: 999px; }
    .project-links { display: flex; gap: 1rem; margin-top: auto; }
    .project-links a { font-size: 0.78rem; color: var(--muted); transition: color 0.2s; }
    .project-links a:hover { color: var(--accent); }

    /* Experience */
    #experience { background: var(--bg); }
    .timeline { position: relative; padding-left: 1.5rem; max-width: 680px; }
    .timeline::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 1px; background: var(--border); }
    .exp-item { position: relative; margin-bottom: 2.5rem; }
    .exp-item::before { content: ''; position: absolute; left: -1.6rem; top: 0.45rem; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
    .exp-role { font-size: 1rem; font-weight: 700; color: var(--white); }
    .exp-company { color: var(--accent); font-size: 0.875rem; margin-left: 0.4rem; }
    .exp-period { font-size: 0.73rem; color: var(--muted); font-family: monospace; margin: 0.2rem 0 0.75rem; }
    .exp-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
    .exp-bullets li { font-size: 0.85rem; color: var(--muted); padding-left: 1rem; position: relative; }
    .exp-bullets li::before { content: '▸'; position: absolute; left: 0; color: var(--accent); font-size: 0.7rem; top: 0.15rem; }

    /* Contact */
    #contact { background: var(--bg2); text-align: center; }
    .contact-sub { color: var(--muted); font-size: 0.9rem; max-width: 400px; margin: 0 auto 2rem; }
    .contact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 0.85rem; max-width: 580px; margin: 0 auto 2rem; text-align: left; }
    .contact-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.9rem 1rem; display: flex; gap: 0.75rem; align-items: center; transition: border-color 0.2s; }
    .contact-card:hover { border-color: rgba(34,211,238,0.4); }
    .contact-icon { font-size: 1.1rem; flex-shrink: 0; }
    .contact-lbl { font-size: 0.67rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .contact-val { font-size: 0.82rem; color: var(--white); }
    .contact-val a:hover { color: var(--accent); }

    footer { text-align: center; padding: 1.5rem; font-size: 0.75rem; color: var(--muted); border-top: 1px solid var(--border); }

    @media (max-width: 640px) {
      .about-grid { grid-template-columns: 1fr; gap: 2rem; }
      .nav-links { gap: 1rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <span class="logo" id="nav-logo"></span>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </div>
</nav>

<section id="home">
  <div class="container">
    <div class="hero-tag" id="hero-title"></div>
    <h1 class="hero-name" id="hero-name"></h1>
    <p class="hero-sub" id="hero-tagline"></p>
    <div class="btn-group">
      <a class="btn btn-primary" href="#projects">View Projects</a>
      <a class="btn btn-outline" href="#contact">Contact Me</a>
    </div>
    <div class="hero-socials" id="hero-socials"></div>
  </div>
</section>

<section id="about">
  <div class="container">
    <p class="section-label">Who I am</p>
    <h2 class="section-title">About Me</h2>
    <div class="about-grid">
      <div class="about-text" id="about-bio"></div>
      <div class="about-cards" id="about-highlights"></div>
    </div>
  </div>
</section>

<section id="skills">
  <div class="container">
    <p class="section-label">My Tech Stack</p>
    <h2 class="section-title">Skills</h2>
    <div class="skills-grid" id="skills-grid"></div>
  </div>
</section>

<section id="projects">
  <div class="container">
    <p class="section-label">What I've Built</p>
    <h2 class="section-title">Projects</h2>
    <div class="projects-grid" id="projects-grid"></div>
  </div>
</section>

<section id="experience">
  <div class="container">
    <p class="section-label">Where I've Worked</p>
    <h2 class="section-title">Experience</h2>
    <div class="timeline" id="timeline"></div>
  </div>
</section>

<section id="contact">
  <div class="container">
    <p class="section-label">Get In Touch</p>
    <h2 class="section-title">Contact</h2>
    <p class="contact-sub">Have a project, opportunity, or just want to connect? Feel free to reach out!</p>
    <div class="contact-grid" id="contact-grid"></div>
    <a class="btn btn-primary" id="contact-btn" href="#">Say Hello</a>
  </div>
</section>

<footer id="footer"></footer>

<!-- Load data first, then render -->
<script src="data.js"></script>
<script>
  const d = PORTFOLIO;

  // Page title & nav logo
  document.title = `${d.name} — ${d.title}`;
  document.getElementById('page-title').textContent = `${d.name} — ${d.title}`;
  document.getElementById('nav-logo').textContent = `<${d.name} />`;

  // Hero
  document.getElementById('hero-title').textContent = d.title;
  document.getElementById('hero-name').textContent = d.name;
  document.getElementById('hero-tagline').textContent = d.tagline;

  // Social label map — add more here if needed
  const SOCIAL_META = {
    email:    { label: 'Email',    icon: '✉️',  contact: true  },
    linkedin: { label: 'LinkedIn', icon: '💼',  contact: true  },
    github:   { label: 'GitHub',   icon: '⬡',   contact: true  },
    medium:   { label: 'Medium',   icon: '📝',  contact: false },
    leetcode: { label: 'LeetCode', icon: '💻',  contact: false },
    twitter:  { label: 'Twitter',  icon: '𝕏',   contact: false },
    kaggle:   { label: 'Kaggle',   icon: '📊',  contact: false },
    website:  { label: 'Website',  icon: '🌐',  contact: false },
    location: { label: 'Location', icon: '📍',  contact: true  },
  };

  function socialHref(key, value) {
    return key === 'email' ? `mailto:${value}` : value;
  }

  // Hero socials bar — show all non-empty socials (except location)
  const socialsEl = document.getElementById('hero-socials');
  Object.entries(d.socials).forEach(([key, value]) => {
    if (!value || key === 'location') return;
    const meta = SOCIAL_META[key] || { label: key };
    socialsEl.innerHTML += `<a href="${socialHref(key, value)}" target="_blank">${meta.label}</a>`;
  });

  // About
  const bioEl = document.getElementById('about-bio');
  d.about.bio.forEach(p => { bioEl.innerHTML += `<p>${p}</p>`; });

  const hlEl = document.getElementById('about-highlights');
  d.about.highlights.forEach(h => {
    hlEl.innerHTML += `
      <div class="about-card">
        <span class="card-icon">${h.icon}</span>
        <div>
          <div class="card-title">${h.title}</div>
          <div class="card-desc">${h.desc}</div>
        </div>
      </div>`;
  });

  // Skills
  const skillsEl = document.getElementById('skills-grid');
  d.skills.forEach(s => {
    skillsEl.innerHTML += `
      <div class="skill-card">
        <div class="skill-cat">${s.category}</div>
        <div class="tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>`;
  });

  // Projects
  const projEl = document.getElementById('projects-grid');
  d.projects.forEach(p => {
    const links = [
      p.github ? `<a href="${p.github}" target="_blank">↗ Code</a>` : '',
      p.demo   ? `<a href="${p.demo}"   target="_blank">↗ Demo</a>` : '',
    ].join('');
    projEl.innerHTML += `
      <div class="project-card">
        <div class="project-title">${p.title}</div>
        <div class="project-desc">${p.desc}</div>
        <div class="project-tags">${p.tags.map(t => `<span class="project-tag">${t}</span>`).join('')}</div>
        <div class="project-links">${links}</div>
      </div>`;
  });

  // Experience
  const tlEl = document.getElementById('timeline');
  d.experience.forEach(e => {
    tlEl.innerHTML += `
      <div class="exp-item">
        <div><span class="exp-role">${e.role}</span><span class="exp-company">@ ${e.company}</span></div>
        <div class="exp-period">${e.period}</div>
        <ul class="exp-bullets">${e.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
      </div>`;
  });

  // Contact — show all non-empty socials + location
  const cgEl = document.getElementById('contact-grid');

  Object.entries(d.socials).forEach(([key, value]) => {
    if (!value) return;
    const meta = SOCIAL_META[key] || { label: key, icon: '🔗' };
    const href = socialHref(key, value);
    const display = key === 'email' ? value : value.replace(/^https?:\/\//, '');
    cgEl.innerHTML += `
      <div class="contact-card">
        <span class="contact-icon">${meta.icon}</span>
        <div>
          <div class="contact-lbl">${meta.label}</div>
          <div class="contact-val"><a href="${href}" target="_blank">${display}</a></div>
        </div>
      </div>`;
  });

  if (d.location) {
    cgEl.innerHTML += `
      <div class="contact-card">
        <span class="contact-icon">📍</span>
        <div>
          <div class="contact-lbl">Location</div>
          <div class="contact-val">${d.location}</div>
        </div>
      </div>`;
  }

  document.getElementById('contact-btn').href = d.socials.email ? `mailto:${d.socials.email}` : '#';

  // Footer
  document.getElementById('footer').textContent =
    `© ${new Date().getFullYear()} ${d.name} · ${d.title}`;
</script>
</body>
</html>
